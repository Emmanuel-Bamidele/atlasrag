services:
  redis:
    build:
      context: .
      dockerfile: Dockerfile.redis
    image: atlasrag/vector-store
    environment:
      VECTOR_WAL: ${VECTOR_WAL:-1}
      WAL_PATH: "/data/wal.log"
    volumes:
      - vector_data:/data

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.node
    image: atlasrag/gateway
    environment:
      TCP_TIMEOUT_MS: "30000"
      TCP_HOST: redis
      TCP_PORT: "6379"

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-${GEMINI_API:-}}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANSWER_PROVIDER: ${ANSWER_PROVIDER:-openai}
      ANSWER_MODEL: ${ANSWER_MODEL:-gpt-4o}
      BOOLEAN_ASK_PROVIDER: ${BOOLEAN_ASK_PROVIDER:-}
      BOOLEAN_ASK_MODEL: ${BOOLEAN_ASK_MODEL:-}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-openai}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-large}
      REFLECT_PROVIDER: ${REFLECT_PROVIDER:-openai}
      REFLECT_MODEL: ${REFLECT_MODEL:-gpt-4o-mini}
      COMPACT_PROVIDER: ${COMPACT_PROVIDER:-}
      COMPACT_MODEL: ${COMPACT_MODEL:-gpt-4o-mini}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      AUTH_MAX_ATTEMPTS: ${AUTH_MAX_ATTEMPTS}
      AUTH_LOCK_MINUTES: ${AUTH_LOCK_MINUTES}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-60}
      TENANT_RATE_LIMIT_WINDOW_MS: ${TENANT_RATE_LIMIT_WINDOW_MS:-60000}
      TENANT_RATE_LIMIT_MAX: ${TENANT_RATE_LIMIT_MAX:-120}
      LOGIN_RATE_LIMIT_WINDOW_MS: ${LOGIN_RATE_LIMIT_WINDOW_MS}
      LOGIN_RATE_LIMIT_MAX: ${LOGIN_RATE_LIMIT_MAX}
      MIGRATIONS_AUTO: ${MIGRATIONS_AUTO}
      MIGRATIONS_ATTEMPTS: ${MIGRATIONS_ATTEMPTS}
      MIGRATIONS_DELAY_MS: ${MIGRATIONS_DELAY_MS}
      TTL_SWEEP_INTERVAL_MS: ${TTL_SWEEP_INTERVAL_MS}
      MEMORY_VALUE_DECAY_INTERVAL_MS: ${MEMORY_VALUE_DECAY_INTERVAL_MS}
      MEMORY_REDUNDANCY_INTERVAL_MS: ${MEMORY_REDUNDANCY_INTERVAL_MS}
      MEMORY_LIFECYCLE_INTERVAL_MS: ${MEMORY_LIFECYCLE_INTERVAL_MS}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED}
      TELEMETRY_CONFIG_ID: ${TELEMETRY_CONFIG_ID}
      TELEMETRY_RUN_ID: ${TELEMETRY_RUN_ID}
      TELEMETRY_FILE: ${TELEMETRY_FILE}
      TELEMETRY_SNAPSHOT_INTERVAL_MS: ${TELEMETRY_SNAPSHOT_INTERVAL_MS}
      MEMORY_LIFECYCLE_MIN_AGE_HOURS: ${MEMORY_LIFECYCLE_MIN_AGE_HOURS}
      MEMORY_LIFECYCLE_MAX_DELETES: ${MEMORY_LIFECYCLE_MAX_DELETES}
      MEMORY_LIFECYCLE_DRY_RUN: ${MEMORY_LIFECYCLE_DRY_RUN}
      MEMORY_LIFECYCLE_DELETE_THRESHOLD: ${MEMORY_LIFECYCLE_DELETE_THRESHOLD}
      MEMORY_LIFECYCLE_SUMMARY_THRESHOLD: ${MEMORY_LIFECYCLE_SUMMARY_THRESHOLD}
      MEMORY_LIFECYCLE_PROMOTE_THRESHOLD: ${MEMORY_LIFECYCLE_PROMOTE_THRESHOLD}
      MEMORY_LIFECYCLE_COMPACT_GROUP_SIZE: ${MEMORY_LIFECYCLE_COMPACT_GROUP_SIZE}
      MEMORY_TIER_HOT_UP: ${MEMORY_TIER_HOT_UP:-}
      MEMORY_TIER_HOT_DOWN: ${MEMORY_TIER_HOT_DOWN:-0.62}
      MEMORY_TIER_WARM_UP: ${MEMORY_TIER_WARM_UP:-0.45}
      MEMORY_TIER_WARM_DOWN: ${MEMORY_TIER_WARM_DOWN:-}
      MEMORY_TIER_EVICT: ${MEMORY_TIER_EVICT:-}
      MEMORY_INIT_VALUE: ${MEMORY_INIT_VALUE:-0.5}
      MEMORY_RETRIEVAL_WARM_SAMPLE_K: ${MEMORY_RETRIEVAL_WARM_SAMPLE_K:-8}
      MEMORY_RETRIEVAL_WARM_SAMPLE_POOL_MULTIPLIER: ${MEMORY_RETRIEVAL_WARM_SAMPLE_POOL_MULTIPLIER:-4}
      MEMORY_RETRIEVAL_COLD_PROBE_EPSILON: ${MEMORY_RETRIEVAL_COLD_PROBE_EPSILON:-0}
      EMBED_FALLBACK_ON_ERROR: ${EMBED_FALLBACK_ON_ERROR:-1}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-600000}
      ALLOW_PRINCIPAL_OVERRIDE: ${ALLOW_PRINCIPAL_OVERRIDE:-0}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      OPENAPI_BASE_URL: ${OPENAPI_BASE_URL}
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE}
      FETCH_USER_AGENT: ${FETCH_USER_AGENT:-}
      OIDC_GOOGLE_CLIENT_ID: ${OIDC_GOOGLE_CLIENT_ID}
      OIDC_GOOGLE_CLIENT_SECRET: ${OIDC_GOOGLE_CLIENT_SECRET}
      OIDC_GOOGLE_ISSUER: ${OIDC_GOOGLE_ISSUER}
      OIDC_GOOGLE_TENANT_CLAIM: ${OIDC_GOOGLE_TENANT_CLAIM}
      OIDC_AZURE_CLIENT_ID: ${OIDC_AZURE_CLIENT_ID}
      OIDC_AZURE_CLIENT_SECRET: ${OIDC_AZURE_CLIENT_SECRET}
      OIDC_AZURE_ISSUER: ${OIDC_AZURE_ISSUER}
      OIDC_AZURE_TENANT_CLAIM: ${OIDC_AZURE_TENANT_CLAIM}
      OIDC_OKTA_CLIENT_ID: ${OIDC_OKTA_CLIENT_ID}
      OIDC_OKTA_CLIENT_SECRET: ${OIDC_OKTA_CLIENT_SECRET}
      OIDC_OKTA_ISSUER: ${OIDC_OKTA_ISSUER}
      OIDC_OKTA_TENANT_CLAIM: ${OIDC_OKTA_TENANT_CLAIM}

      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT}
      PGDATABASE: ${PGDATABASE}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
    volumes:
      - ./telemetry:/app/telemetry
    ports:
      - "${GATEWAY_HOST_PORT:-3000}:3000"
    depends_on:
      - redis

volumes:
  vector_data:
