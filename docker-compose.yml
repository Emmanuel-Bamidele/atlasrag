services:
  redis:
    build:
      context: .
      dockerfile: Dockerfile.redis
    # keep internal in production; for local debugging you can uncomment:
    # ports:
    #   - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./gateway/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.node
    environment:
      TCP_HOST: redis
      TCP_PORT: "6379"

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      API_KEY: ${API_KEY}

      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - postgres

volumes:
  pgdata:

