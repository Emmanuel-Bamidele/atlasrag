services:
  redis:
    build:
      context: .
      dockerfile: Dockerfile.redis
    image: atlasrag/vector-store
    environment:
      VECTOR_WAL: "0"
    # keep internal in production; for local debugging you can uncomment:
    # ports:
    #   - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./gateway/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.node
    image: atlasrag/gateway
    environment:
      TCP_TIMEOUT_MS: "30000"
      TCP_HOST: redis
      TCP_PORT: "6379"

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      AUTH_MAX_ATTEMPTS: ${AUTH_MAX_ATTEMPTS}
      AUTH_LOCK_MINUTES: ${AUTH_LOCK_MINUTES}
      LOGIN_RATE_LIMIT_WINDOW_MS: ${LOGIN_RATE_LIMIT_WINDOW_MS}
      LOGIN_RATE_LIMIT_MAX: ${LOGIN_RATE_LIMIT_MAX}
      MIGRATIONS_AUTO: ${MIGRATIONS_AUTO}
      MIGRATIONS_ATTEMPTS: ${MIGRATIONS_ATTEMPTS}
      MIGRATIONS_DELAY_MS: ${MIGRATIONS_DELAY_MS}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE}
      OIDC_GOOGLE_CLIENT_ID: ${OIDC_GOOGLE_CLIENT_ID}
      OIDC_GOOGLE_CLIENT_SECRET: ${OIDC_GOOGLE_CLIENT_SECRET}
      OIDC_GOOGLE_ISSUER: ${OIDC_GOOGLE_ISSUER}
      OIDC_GOOGLE_TENANT_CLAIM: ${OIDC_GOOGLE_TENANT_CLAIM}
      OIDC_AZURE_CLIENT_ID: ${OIDC_AZURE_CLIENT_ID}
      OIDC_AZURE_CLIENT_SECRET: ${OIDC_AZURE_CLIENT_SECRET}
      OIDC_AZURE_ISSUER: ${OIDC_AZURE_ISSUER}
      OIDC_AZURE_TENANT_CLAIM: ${OIDC_AZURE_TENANT_CLAIM}
      OIDC_OKTA_CLIENT_ID: ${OIDC_OKTA_CLIENT_ID}
      OIDC_OKTA_CLIENT_SECRET: ${OIDC_OKTA_CLIENT_SECRET}
      OIDC_OKTA_ISSUER: ${OIDC_OKTA_ISSUER}
      OIDC_OKTA_TENANT_CLAIM: ${OIDC_OKTA_TENANT_CLAIM}

      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - postgres

volumes:
  pgdata:
