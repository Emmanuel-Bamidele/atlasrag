# docker-compose.ec2.override.yml
# EC2 production override — apply after docker-compose.prod.yml and the portal overlay:
#
#   docker compose \
#     -f docker-compose.prod.yml \
#     -f ../supavector-portal/docker-compose.override.yml \
#     -f docker-compose.ec2.override.yml \
#     --env-file .env up -d --build gateway
#
# Assumes both repos are cloned side-by-side under the same parent directory:
#   /opt/supavector/           ← this repo (public)
#   /opt/supavector-portal/    ← portal plugins repo (private)

services:
  gateway:
    build:
      context: ..
      dockerfile: supavector-portal/Dockerfile.node.portal
      args:
        REPO_DIR: supavector
    ports:
      - "127.0.0.1:3300:3000"

  # Host nginx handles SSL termination and proxies to the gateway on port 3300.
  # The Docker proxy container is not used on EC2 — disable it.
  proxy:
    profiles: ["disabled"]

