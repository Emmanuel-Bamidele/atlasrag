# docker-compose.ec2.override.yml
# EC2 production override — apply after docker-compose.prod.yml and the portal overlay:
#
#   docker compose \
#     -f docker-compose.prod.yml \
#     -f ../atlasrag-portal/docker-compose.override.yml \
#     -f docker-compose.ec2.override.yml \
#     --env-file .env up -d --build gateway
#
# Assumes both repos are cloned side-by-side under the same parent directory:
#   /opt/atlasrag/           ← this repo (public)
#   /opt/atlasrag-portal/    ← portal plugins repo (private)

services:
  gateway:
    build:
      context: ..
      dockerfile: atlasrag-portal/Dockerfile.node.portal
    ports:
      - "127.0.0.1:3300:3000"
